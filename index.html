<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد الطالب الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0F1A;
    --surface: #151825;
    --surface2: #1C2035;
    --surface3: #232840;
    --accent: #6C63FF;
    --accent2: #A78BFA;

    
    --accent3: #38BDF8;
    --gold: #F59E0B;
    --text: #E8EAFF;
    --text2: #9BA3C7;
    --text3: #5C6494;
    --border: rgba(108,99,255,0.2);
    --border2: rgba(108,99,255,0.08);
    --glow: 0 0 30px rgba(108,99,255,0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb1, .orb2 {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(108,99,255,0.12), transparent 70%);
    top: -100px; right: -100px;
  }
  .orb2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(56,189,248,0.08), transparent 70%);
    bottom: 100px; left: -80px;
  }

  /* Layout */
  .layout {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Header */
  header {
    padding: 18px 0 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border2);
  }

  .logo-wrap {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6C63FF, #A78BFA);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-info p {
    font-size: 12px;
    color: var(--text3);
    font-family: 'Tajawal', sans-serif;
  }

  .status-badge {
    margin-right: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.2);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent3);
    font-family: 'Tajawal', sans-serif;
  }

  .status-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22D3EE;
    box-shadow: 0 0 6px #22D3EE;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Quick actions */
  .quick-bar {
    padding: 14px 0 10px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .quick-bar::-webkit-scrollbar { display: none; }

  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .chip:hover {
    background: rgba(108,99,255,0.15);
    border-color: var(--accent);
    color: var(--accent2);
    transform: translateY(-1px);
  }
  .chip-icon { font-size: 14px; }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface3) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  /* Welcome state */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 40px 20px;
    text-align: center;
    gap: 16px;
    animation: fadeIn 0.5s ease;
  }

  .welcome-icon {
    width: 72px; height: 72px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(167,139,250,0.2));
    border: 1px solid rgba(108,99,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    margin-bottom: 8px;
  }

  .welcome h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }

  .welcome p {
    font-size: 15px;
    color: var(--text2);
    font-family: 'Tajawal', sans-serif;
    max-width: 400px;
    line-height: 1.7;
  }

  /* Message bubbles */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-row.bot .msg-avatar {
    background: linear-gradient(135deg, #6C63FF, #A78BFA);
    box-shadow: 0 2px 12px rgba(108,99,255,0.3);
  }

  .msg-row.user .msg-avatar {
    background: var(--surface3);
    border: 1px solid var(--border);
  }

  .msg-bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.75;
    font-family: 'Tajawal', sans-serif;
    font-weight: 400;
  }

  .msg-row.bot .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    color: var(--text);
  }

  .msg-row.user .msg-bubble {
    background: linear-gradient(135deg, #6C63FF, #7C75FF);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
    color: white;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }

  /* Typing indicator */
  .typing-wrap {
    display: flex;
    gap: 10px;
    animation: slideUp 0.3s ease;
  }

  .typing-bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing 1.3s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input area */
  .input-section {
    padding: 14px 0 20px;
    flex-shrink: 0;
  }

  .input-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
  }

  .input-box textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14.5px;
    font-family: 'Tajawal', sans-serif;
    resize: none;
    height: 24px;
    max-height: 120px;
    line-height: 1.6;
    overflow: hidden;
  }

  .input-box textarea::placeholder { color: var(--text3); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #6C63FF, #7C75FF);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(108,99,255,0.35);
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 18px rgba(108,99,255,0.5); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .input-hint {
    margin-top: 8px;
    text-align: center;
    font-size: 11.5px;
    color: var(--text3);
    font-family: 'Tajawal', sans-serif;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .msg-bubble { max-width: 88%; font-size: 14px; }
    .welcome h2 { font-size: 20px; }
    header { padding: 14px 0 12px; }
    .status-badge span { display: none; }
  }
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>

<div class="layout">
  <!-- Header -->
  <header>
    <div class="logo-wrap">🎓</div>
    <div class="header-info">
      <h1>مساعد الطالب الذكي</h1>
      
    </div>
    <div class="status-badge">
      <span>متصل الآن</span>
    </div>
  </header>

  <!-- Quick chips -->
  <div class="quick-bar">
    <button class="chip" onclick="quickSend('اشرح لي مفهوم التفاضل والتكامل بطريقة بسيطة مع أمثلة')">
      <span class="chip-icon">📐</span> رياضيات
    </button>
    <button class="chip" onclick="quickSend('اشرح لي قوانين نيوتن الثلاثة بطريقة مبسطة')">
      <span class="chip-icon">⚛️</span> فيزياء
    </button>
    <button class="chip" onclick="quickSend('كيف أنظم وقت دراستي بشكل فعّال قبل الامتحانات؟')">
      <span class="chip-icon">⏰</span> تنظيم وقت
    </button>
    <button class="chip" onclick="quickSend('ساعدني في كتابة مقالة إنشائية عن أهمية العلم')">
      <span class="chip-icon">✍️</span> إنشاء
    </button>
    <button class="chip" onclick="quickSend('ما هي أهم الأحداث في الحرب العالمية الثانية؟')">
      <span class="chip-icon">📜</span> تاريخ
    </button>
    <button class="chip" onclick="quickSend('اشرح لي التركيب الخلوي للكائنات الحية')">
      <span class="chip-icon">🔬</span> أحياء
    </button>
    <button class="chip" onclick="quickSend('كيف أحسّن مستواي في اللغة الإنجليزية؟')">
      <span class="chip-icon">🌐</span> إنجليزي
    </button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🎓</div>
      <h2>أهلاً بك في مساعد الطالب الذكي</h2>
      <p>أنا هنا لمساعدتك في جميع مواد دراستك. اسألني أي سؤال وسأشرح لك بأسلوب واضح وبسيط!</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-box">
      <textarea
        id="userInput"
        placeholder="اكتب سؤالك هنا... (Enter للإرسال، Shift+Enter لسطر جديد)"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="إرسال">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    
</div>

<script>
const SYSTEM_PROMPT = `أنت مساعد ذكاء اصطناعي متخصص في مساعدة الطلاب. اسمك "مساعد الطالب الذكي".

مهامك الأساسية:
- شرح المفاهيم الدراسية بطريقة بسيطة ومنهجية
- المساعدة في حل المسائل الرياضية والعلمية
- تلخيص وشرح المواد الدراسية بجميع المراحل
- كتابة المقالات والإنشاءات بأسلوب أدبي راقٍ
- تقديم نصائح فعّالة لتنظيم الوقت والمذاكرة
- الإجابة على أسئلة جميع المواد (رياضيات، فيزياء، كيمياء، أحياء، تاريخ، جغرافيا، لغة عربية، إنجليزي)

أسلوبك:
- استخدم اللغة العربية الفصحى البسيطة
- كن صبوراً ومشجعاً دائماً
- استخدم أمثلة واقعية وقريبة من حياة الطالب
- قسّم الإجابات لخطوات واضحة عند الحاجة
- استخدم الأرقام والقوائم لتسهيل الفهم
- إذا كان السؤال خارج نطاق الدراسة، أعد توجيه الطالب بلطف`;

let chatHistory = [];
let isLoading = false;

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  appendMessage(text, 'user');
  input.value = '';
  input.style.height = '24px';
  chatHistory.push({ role: 'user', content: text });

  // Show typing
  const typingId = showTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const response = await fetch('https://maud-unmovable-kathi.ngrok-free.dev/webhook/chatbot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json',},
      body: JSON.stringify({
  message: text,
  chatHistory: chatHistory,
  systemPrompt: SYSTEM_PROMPT
})
    });

    const data = await response.json();
    const reply = data.reply || 'عذراً، لم أتمكن من الإجابة. حاول مرة أخرى.';

    removeTyping(typingId);
    appendMessage(reply, 'bot');
    chatHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping(typingId);
    appendMessage('عذراً، حدث خطأ في الاتصال. تأكد من اتصالك بالإنترنت وحاول مجدداً.', 'bot');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function appendMessage(text, type) {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${type}`;

  const icon = type === 'bot' ? '🎓' : '👤';
  const formatted = text.replace(/\n/g, '<br>');

  row.innerHTML = `
    <div class="msg-avatar">${icon}</div>
    <div class="msg-bubble">${formatted}</div>
  `;

  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const id = 'typing_' + Date.now();
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = id;
  wrap.innerHTML = `
    <div class="msg-avatar" style="background:linear-gradient(135deg,#6C63FF,#A78BFA);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px;box-shadow:0 2px 12px rgba(108,99,255,0.3)">🎓</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '24px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
